version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoreel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoreel
      POSTGRES_PASSWORD: autoreel
      POSTGRES_DB: autoreel
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autoreel-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
