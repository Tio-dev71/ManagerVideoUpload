version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autoreel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/autoreel?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: node dist/worker.js
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/autoreel?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
  uploads_data:
